# Maven package Java project Web App to Linux on Azure
# Build your Java project and deploy it to Azure as a Linux web app
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/java

trigger:
- main

variables:

  # Azure Resource Manager connection created during pipeline creation
  azureSubscription: 'a4ed72c3-b692-4c46-9b21-26cc623145b7'
  
  # Web app name
  webAppName: 'sjs-VeraDemo'

  # Environment name
  environmentName: 'sjs-VeraDemo'
  
  # Agent VM image name
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build stage
  jobs:
  - job: MavenPackageAndPublishArtifacts
    displayName: Maven Package and Publish Artifacts
    pool:
      vmImage: $(vmImageName)
    
    steps:
    - task: Maven@3
      displayName: 'Maven Package'
      inputs:
        mavenPomFile: 'pom.xml'

    - task: CopyFiles@2
      displayName: 'Copy Files to artifact staging directory'
      inputs:
        SourceFolder: '$(System.DefaultWorkingDirectory)'
        Contents: '**/target/*.?(war|jar)'
        TargetFolder: $(Build.ArtifactStagingDirectory)

    - upload: $(Build.ArtifactStagingDirectory)
      artifact: drop

    - task: Veracode@3
      inputs:
        ConnectionDetailsSelection: 'Endpoint'
        AnalysisService: 'Veracode Analysis Center'
        veracodeAppProfile: '$(system.teamProject)'
        version: '$(build.buildNumber)'
        filepath: '$(build.artifactstagingdirectory)'
        sandboxName: 'Release_Candidate'
        createSandBox: true
        createProfile: true
        failTheBuildIfVeracodeScanDidNotInitiate: true
        scanStatusCheckInterval: '60'
        importResults: false
        failBuildOnPolicyFail: false

    - task: Veracode Flaw Importer@3
      inputs:
        ConnectionDetailsSelection: 'Endpoint'
        AnalysisService: 'Veracode Analysis Center'
        veracodeAppProfile: '$(system.teamProject)'
        sandboxName: 'Release_Candidate'
        importType: 'All Unmitigated Flaws Violating Policy'
        workItemType: 'Issue'
        area: '$(system.teamProject)'
        flawImportLimit: '1000'
        
    - task: AzureCLI@2
      inputs:
        azureSubscription: 'Azure subscription 1 (d9d1241a-9ddb-491a-9a50-caed368eae49)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          echo ---download the latest version of the Veracode pipeline scan CI utility
          curl -O https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
          echo ---extract the Veracode pipeline scan CI utility
          unzip -o pipeline-scan-LATEST.zip
          echo ---run the a Veracode Static Analysis scan using the Veracode pipeline scan CI utility
          java -jar pipeline-scan.jar -vid $(vid) -vkey $(vkey) -f "/home/vsts/work/1/s/target/verademo.war"

- stage: Deploy
  displayName: Deploy stage
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployLinuxWebApp
    displayName: Deploy Linux Web App
    environment: $(environmentName)
    pool: 
      vmImage: $(vmImageName)
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            displayName: 'Azure Web App Deploy: sjs-VeraDemo'
            inputs:
              azureSubscription: $(azureSubscription)
              appType: webAppLinux
              appName: $(webAppName)
              package: '$(Pipeline.Workspace)/drop/**/target/*.?(war|jar)'
