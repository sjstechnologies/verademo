name: Verademo-Pipeline

on: [push]

jobs:
  build-pipelinescan:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Set up JDK 1.8
      uses: actions/setup-java@v1
      with:
        java-version: 1.8
  
    - name: Build with Maven
      run: mvn clean verify

    - name: Download the Pipeline Scanner
      uses: wei/curl@master
      with:
        args: -O https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
    
    - name: Unzip the Pipeline Scanner
      run: unzip pipeline-scan-LATEST.zip pipeline-scan.jar
 
    - name: Engage Ludicrous Speed - Run Pipeline Scan
      run: java -jar pipeline-scan.jar -f /home/runner/work/verademo/verademo/target/verademo.war -vid "${{secrets.VERACODE_API_ID}}" -vkey "${{secrets.VERACODE_API_SECRET}}" --fail_on_severity="Very High, High" --issue_details true --jo true
    
    - name: Veracode Static Analysis Pipeline Scan and SARIF import
      uses: veracode/veracode-pipeline-scan-results-to-sarif@v0.1.5
      with:
      pipeline-results-json: results.json
      output-results-sarif: /home/runner/work/verademo/verademo/target/veracode-results.sarif
      source-base-path-1:
      source-base-path-2:
      source-base-path-3:
      finding-rule-level: 4:3:0
  
